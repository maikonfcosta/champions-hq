name: CI

on:
  push:
    branches: [main, preview]
  pull_request:
    branches: [main, preview]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # Testes NÃO rodam no CI — são executados manualmente pelo dev
